# CI Workflow: Pre-commit Enforcement
#
# Runs the project's pre-commit hooks in CI using pre-commit run.
# This mirrors local pre-commit exactly:
#   - markdownlint-cli2 (markdown formatting)
#   - gitleaks (secret detection)
#   - AI review hooks (gracefully degrade — warn and pass
#     when no AI CLI is available in CI)
#
# Security controls:
#   SEC-003: Explicit minimal permissions (contents: read)
#   SEC-004: Actions pinned to commit SHAs
#
# Design reference: .sdlc/sessions/task-pre-commit-config/adr.md

name: CI

on:
  push:
    branches: [main]
  pull_request:

# SEC-003: Explicit minimal permissions — no write access
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3.12 -m ensurepip --upgrade
          python3.12 -m pip install pre-commit

      - name: Lint with pre-commit
        run: |
          pre-commit run --all-files --show-diff-on-failure
